<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸识别管理中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: 0.3s;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 光球装饰 */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.05));
            box-shadow: 0 0 80px rgba(79, 172, 254, 0.6);
            z-index: 1;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            top: -200px;
            right: -150px;
            animation: float 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -100px;
            animation: float 12s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            top: 50%;
            right: 10%;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-30px) rotate(10deg); opacity: 1; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
        }

        /* Tab导航 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            border-color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Tab内容面板 */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 毛玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 30px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }

        /* 摄像头容器 */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 480px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .camera-container video,
        .camera-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        /* 按钮样式 */
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* 状态消息 */
        .status-message {
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1rem;
            text-align: center;
            display: none;
        }

        .status-message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 2px solid #4caf50;
            color: white;
        }

        .status-message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            color: white;
        }

        .status-message.info {
            background: rgba(33, 150, 243, 0.2);
            border: 2px solid #2196F3;
            color: white;
        }

        /* 人脸列表 */
        .face-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .face-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .face-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .face-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .face-card .face-info {
            color: #333;
            margin-bottom: 10px;
        }

        .face-card .face-info strong {
            color: #667eea;
        }

        .face-card .face-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .face-card .btn {
            flex: 1;
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        /* 文件上传区域 */
        .upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .upload-area:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-area p {
            color: white;
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .upload-preview {
            max-width: 400px;
            max-height: 400px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }

        .upload-preview img {
            width: 100%;
            height: auto;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 返回首页链接 */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-title h1 {
                font-size: 2.5rem;
            }

            .tab-nav {
                gap: 10px;
            }

            .tab-btn {
                padding: 12px 25px;
                font-size: 1rem;
            }

            .glass-card {
                padding: 25px;
            }

            .camera-container {
                height: 320px;
            }

            .face-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 光球装饰 -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- 返回首页链接 -->
    <a href="/" class="back-link">← 返回首页</a>

    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">
            <h1>🎭 人脸识别管理中心</h1>
            <p>Face Recognition Management System</p>
        </div>

        <!-- Tab导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('register')">👤 人脸注册</button>
            <button class="tab-btn" onclick="switchTab('search')">🔍 人脸查询</button>
            <button class="tab-btn" onclick="switchTab('manage')">📋 人脸管理</button>
        </div>

        <!-- Tab 1: 人脸注册 -->
        <div id="tab-register" class="tab-content active">
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 30px; font-size: 2rem;">📸 人脸注册</h2>
                
                <div class="camera-container">
                    <video id="register-video" autoplay playsinline></video>
                    <canvas id="register-canvas"></canvas>
                </div>

                <div class="form-group">
                    <label for="register-userid">用户ID</label>
                    <input type="text" id="register-userid" placeholder="请输入用户ID，如：user001">
                </div>

                <div class="form-group">
                    <label for="register-role">角色/身份</label>
                    <input type="text" id="register-role" placeholder="请输入角色，如：员工、访客等">
                </div>

                <button class="btn btn-primary" onclick="captureAndRegister()">
                    <span>📷 拍照并注册</span>
                </button>

                <div id="register-status" class="status-message"></div>
            </div>
        </div>

        <!-- Tab 2: 人脸查询 -->
        <div id="tab-search" class="tab-content">
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 30px; font-size: 2rem;">🔍 人脸查询</h2>
                
                <h3 style="color: white; margin-bottom: 20px;">方式一：上传图片搜索</h3>
                
                <div class="upload-area" onclick="document.getElementById('search-file-input').click()">
                    <input type="file" id="search-file-input" accept="image/*" onchange="handleSearchFileSelect(event)">
                    <p>📁 点击上传图片进行人脸搜索</p>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">支持 JPG、PNG 格式</p>
                </div>

                <div id="search-preview" class="upload-preview">
                    <img id="search-preview-img" alt="预览图片">
                </div>

                <button class="btn btn-success" onclick="searchFaceByImage()" id="search-btn" style="display: none;">
                    <span>🔍 开始搜索</span>
                </button>

                <div id="search-result" class="status-message"></div>

                <div id="search-result-detail" style="display: none; margin-top: 30px;">
                    <h3 style="color: white; margin-bottom: 20px;">搜索结果</h3>
                    <div class="glass-card" style="background: rgba(255, 255, 255, 0.95);">
                        <div id="search-result-content"></div>
                    </div>
                </div>

                <hr style="border: 1px solid rgba(255, 255, 255, 0.3); margin: 40px 0;">

                <h3 style="color: white; margin-bottom: 20px;">方式二：查看所有已注册人脸</h3>
                
                <button class="btn btn-primary" onclick="loadAllFaces()">
                    <span>📋 查看所有人脸</span>
                </button>

                <div id="all-faces-container"></div>
            </div>
        </div>

        <!-- Tab 3: 人脸管理 -->
        <div id="tab-manage" class="tab-content">
            <div class="glass-card">
                <h2 style="color: white; margin-bottom: 30px; font-size: 2rem;">📋 人脸管理与删除</h2>
                
                <button class="btn btn-primary" onclick="loadFacesForManage()">
                    <span>🔄 刷新列表</span>
                </button>

                <div id="manage-faces-grid" class="face-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let registerVideo = null;
        let registerCanvas = null;
        let searchImageData = null;

        // ========== Tab切换 ==========
        function switchTab(tabName) {
            // 隐藏所有Tab内容
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // 移除所有Tab按钮的active状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 显示选中的Tab
            document.getElementById('tab-' + tabName).classList.add('active');

            // 激活对应按钮
            event.target.classList.add('active');

            // 如果切换到注册Tab，启动摄像头
            if (tabName === 'register') {
                setTimeout(initRegisterCamera, 100);
            }
        }

        // ========== 人脸注册功能 ==========
        function initRegisterCamera() {
            registerVideo = document.getElementById('register-video');
            registerCanvas = document.getElementById('register-canvas');

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    registerVideo.srcObject = stream;
                })
                .catch(error => {
                    console.error('摄像头访问失败:', error);
                    showMessage('register-status', '摄像头访问失败: ' + error.message, 'error');
                });
        }

        function captureAndRegister() {
            const userId = document.getElementById('register-userid').value.trim();
            const role = document.getElementById('register-role').value.trim();

            if (!userId) {
                showMessage('register-status', '请输入用户ID', 'error');
                return;
            }

            if (!role) {
                showMessage('register-status', '请输入角色', 'error');
                return;
            }

            // 拍照
            registerCanvas.width = registerVideo.videoWidth;
            registerCanvas.height = registerVideo.videoHeight;
            const ctx = registerCanvas.getContext('2d');
            ctx.drawImage(registerVideo, 0, 0);

            const base64Image = registerCanvas.toDataURL('image/jpeg', 0.9);

            showMessage('register-status', '正在注册中...', 'info');

            // 发送注册请求
            fetch('/face/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    base64Image: base64Image,
                    userId: userId,
                    role: role
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP错误! 状态: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                if (result.code === 200) {
                    showMessage('register-status', '✅ ' + result.message + ' (人脸ID: ' + result.data.faceId + ')', 'success');
                    // 清空表单
                    document.getElementById('register-userid').value = '';
                    document.getElementById('register-role').value = '';
                } else {
                    showMessage('register-status', '❌ ' + result.message, 'error');
                }
            })
            .catch(error => {
                console.error('注册失败:', error);
                showMessage('register-status', '❌ 注册失败: ' + error.message, 'error');
            });
        }

        // ========== 人脸搜索功能 ==========
        function handleSearchFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                searchImageData = e.target.result;
                document.getElementById('search-preview-img').src = e.target.result;
                document.getElementById('search-preview').style.display = 'block';
                document.getElementById('search-btn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }

        function searchFaceByImage() {
            if (!searchImageData) {
                showMessage('search-result', '请先上传图片', 'error');
                return;
            }

            showMessage('search-result', '正在搜索中...', 'info');

            fetch('/face/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ base64Image: searchImageData })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP错误! 状态: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                if (result.code === 200 && result.data.found) {
                    const data = result.data;
                    showMessage('search-result', '✅ 找到匹配！相似度: ' + (data.similarity * 100).toFixed(2) + '%', 'success');
                    
                    // 显示详细结果
                    const detailHtml = `
                        <div style="color: #333;">
                            <p><strong>人脸ID:</strong> ${data.faceId}</p>
                            <p><strong>用户ID:</strong> ${data.userId}</p>
                            <p><strong>角色:</strong> ${data.role}</p>
                            <p><strong>相似度:</strong> ${(data.similarity * 100).toFixed(2)}%</p>
                            ${data.imageUrl ? `<img src="${data.imageUrl}" alt="人脸图片" style="max-width: 300px; margin-top: 20px; border-radius: 10px;">` : ''}
                        </div>
                    `;
                    document.getElementById('search-result-content').innerHTML = detailHtml;
                    document.getElementById('search-result-detail').style.display = 'block';
                } else {
                    showMessage('search-result', '❌ 未找到匹配的人脸', 'error');
                    document.getElementById('search-result-detail').style.display = 'none';
                }
            })
            .catch(error => {
                console.error('搜索失败:', error);
                showMessage('search-result', '❌ 搜索失败: ' + error.message, 'error');
            });
        }

        function loadAllFaces() {
            const container = document.getElementById('all-faces-container');
            container.innerHTML = '<p style="color: white; text-align: center;">加载中...</p>';

            fetch('/face/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP错误! 状态: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                if (result.code === 200) {
                    displayFaceList(result.data, container);
                } else {
                    container.innerHTML = `<p style="color: white; text-align: center;">❌ ${result.message}</p>`;
                }
            })
            .catch(error => {
                console.error('加载失败:', error);
                container.innerHTML = `<p style="color: white; text-align: center;">❌ 加载失败</p>`;
            });
        }

        // ========== 人脸管理功能 ==========
        function loadFacesForManage() {
            const grid = document.getElementById('manage-faces-grid');
            grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">加载中...</p>';

            fetch('/face/list')
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP错误! 状态: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                if (result.code === 200) {
                    displayFaceGrid(result.data, grid, true);
                } else {
                    grid.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">❌ ${result.message}</p>`;
                }
            })
            .catch(error => {
                console.error('加载失败:', error);
                grid.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">❌ 加载失败</p>`;
            });
        }

        function deleteFaceById(faceId) {
            if (!confirm('确认删除此人脸吗？')) {
                return;
            }

            fetch('/face/delete/' + faceId, {
                method: 'DELETE'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('HTTP错误! 状态: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                if (result.code === 200) {
                    alert('✅ 删除成功');
                    loadFacesForManage(); // 刷新列表
                } else {
                    alert('❌ 删除失败: ' + result.message);
                }
            })
            .catch(error => {
                console.error('删除失败:', error);
                alert('❌ 删除失败: ' + error.message);
            });
        }

        // ========== 辅助函数 ==========
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'status-message ' + type;
            element.style.display = 'block';

            // 3秒后自动隐藏成功消息
            if (type === 'success') {
                setTimeout(() => {
                    element.style.display = 'none';
                }, 3000);
            }
        }

        function displayFaceList(faces, container) {
            if (!faces || faces.length === 0) {
                container.innerHTML = '<p style="color: white; text-align: center; margin-top: 30px;">暂无人脸数据</p>';
                return;
            }

            let html = '<div class="face-grid" style="margin-top: 30px;">';
            faces.forEach(face => {
                html += `
                    <div class="face-card">
                        ${face.imageUrl ? `<img src="${face.imageUrl}" alt="${face.userId}">` : '<div style="height: 200px; background: #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center;">无图片</div>'}
                        <div class="face-info"><strong>用户ID:</strong> ${face.userId}</div>
                        <div class="face-info"><strong>角色:</strong> ${face.role}</div>
                        <div class="face-info"><strong>人脸ID:</strong> ${face.faceId}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function displayFaceGrid(faces, grid, showDelete = false) {
            if (!faces || faces.length === 0) {
                grid.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">暂无人脸数据</p>';
                return;
            }

            grid.innerHTML = '';
            faces.forEach(face => {
                const card = document.createElement('div');
                card.className = 'face-card';
                card.innerHTML = `
                    ${face.imageUrl ? `<img src="${face.imageUrl}" alt="${face.userId}">` : '<div style="height: 200px; background: #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center;">无图片</div>'}
                    <div class="face-info"><strong>用户ID:</strong> ${face.userId}</div>
                    <div class="face-info"><strong>角色:</strong> ${face.role}</div>
                    <div class="face-info"><strong>人脸ID:</strong> ${face.faceId}</div>
                    ${showDelete ? `
                        <div class="face-actions">
                            <button class="btn btn-danger" onclick="deleteFaceById('${face.faceId}')">🗑️ 删除</button>
                        </div>
                    ` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // ========== 页面加载时初始化 ==========
        window.onload = function() {
            // 默认启动注册摄像头
            initRegisterCamera();
        };
    </script>
</body>
</html>
