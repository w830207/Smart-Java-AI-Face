# ========================================
# 人脸识别管理系统 - 应用配置
# ========================================

# 服务器端口配置
# 默认: 8080
# 如果端口被占用，可修改为其他端口，如: 8081, 9090 等
server.port=8080

# 静态资源配置
# 配置人脸图片访问路径，使前端可以访问已保存的人脸图片
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:face-imgs/

# Thymeleaf 模板配置
# 开发模式：禁用缓存，修改HTML后刷新即可看到效果
# 生产模式：建议启用缓存以提升性能
spring.thymeleaf.cache=false

# 日志配置
# 可选级别: TRACE, DEBUG, INFO, WARN, ERROR
# 开发调试时可设置为 DEBUG
logging.level.com.codeying=INFO

# 文件上传配置（可选）
# 如果需要上传大文件，可调整以下配置
# spring.servlet.multipart.max-file-size=10MB
# spring.servlet.multipart.max-request-size=10MB





